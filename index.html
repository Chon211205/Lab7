<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Snake React</title>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      background-color: #111;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .board {
        position: relative;
        width: 400px;
        height: 400px;
        margin: 30px auto;
        background-color: #222;
        border: 3px solid white;
    }

    .snake-part {
    position: absolute;
    width: 20px;
    height: 20px;
    background-color: limegreen;
    border: 1px solid #111;
    box-sizing: border-box;
    transition: left 0.18s linear, top 0.18s linear;
    }

    .head {
    background-color: #00ffcc;
    border-radius: 4px;
    }

    .tail {
    background-color: #006633;
    border-radius: 2px;
    }

    .eye {
    position: absolute;
    width: 4px;
    height: 4px;
    background: black;
    border-radius: 50%;
    }

    /* posiciones base */
    .eye1 { top: 4px; left: 4px; }
    .eye2 { top: 4px; right: 4px; }

    /* mirando derecha */
    .right.eye1 { top: 6px; left: 10px; }
    .right.eye2 { top: 10px; left: 10px; }

    /* mirando izquierda */
    .left.eye1 { top: 6px; left: 2px; }
    .left.eye2 { top: 10px; left: 2px; }

    /* mirando arriba */
    .up.eye1 { top: 2px; left: 6px; }
    .up.eye2 { top: 2px; right: 6px; }

    /* mirando abajo */
    .down.eye1 { bottom: 2px; left: 6px; }
    .down.eye2 { bottom: 2px; right: 6px; }

    .food {
        position: absolute;
        width: 20px;
        height: 20px;
        background-color: red;
        border-radius: 50%;
    }
  </style>
</head>

<body>
  <div id="root"></div>

<script type="text/babel">
  const { useState, useEffect } = React;

  const cellSize = 20;
  const boardSize = 20;

    function Snake({ snake, direction }) {
    return (
        <>
        {snake.map((part, index) => {
            let className = "snake-part";

            if (index === 0) className += " head";
            else if (index === snake.length - 1) className += " tail";

            return (
            <div
                key={index}
                className={className}
                style={{
                left: part.x * 20,
                top: part.y * 20
                }}
            >
                {index === 0 && (
                <>
                    <div className={`eye eye1 ${getEyeClass(direction)}`}></div>
                    <div className={`eye eye2 ${getEyeClass(direction)}`}></div>
                </>
                )}
            </div>
            );
        })}
        </>
    );
    }

    function getEyeClass(direction) {
    if (direction.x === 1) return "right";
    if (direction.x === -1) return "left";
    if (direction.y === -1) return "up";
    if (direction.y === 1) return "down";
    }

    function Food({ food }) {
        return (
        <div
            className="food"
            style={{
            left: food.x * cellSize,
            top: food.y * cellSize
            }}
        />
        );
    }

  function Score({ score }) {
    return <h2>Puntaje: {score}</h2>;
  }

  function Board({ snake, food, direction }) {
    return (
      <div className="board">
        <Snake snake={snake} direction={direction} />
        <Food food={food} />
      </div>
    );
  }

  function App() {
    const [snake, setSnake] = useState([
      { x: 10, y: 10 },
      { x: 9, y: 10 },
      { x: 8, y: 10 }
    ]);

    const [direction, setDirection] = useState({ x: 1, y: 0 });
    const [food, setFood] = useState({ x: 5, y: 5 });
    const [score, setScore] = useState(0);
    const [gameOver, setGameOver] = useState(false);

    function generateFood() {
      return {
        x: Math.floor(Math.random() * boardSize),
        y: Math.floor(Math.random() * boardSize)
      };
    }

    useEffect(() => {
      if (gameOver) return;

      const interval = setInterval(() => {
        setSnake(prevSnake => {
        const newHead = {
            x: prevSnake[0].x + direction.x,
            y: prevSnake[0].y + direction.y
        };

        if (
            newHead.x < 0 ||
            newHead.y < 0 ||
            newHead.x >= boardSize ||
            newHead.y >= boardSize
        ) {
            setGameOver(true);
            return prevSnake;
        }

        const hitSelf = prevSnake.some(part => {
            return part.x === newHead.x && part.y === newHead.y;
        });

        if (hitSelf) {
            setGameOver(true);
            return prevSnake;
        }

        const ateFood = newHead.x === food.x && newHead.y === food.y;

        if (ateFood) {
            setFood(generateFood());
            setScore(prev => prev + 1);
            return [newHead, ...prevSnake];
        }

        return [newHead, ...prevSnake.slice(0, -1)];
        });
      }, 180);

      return () => clearInterval(interval);
    }, [direction, gameOver, food]);

    useEffect(() => {
    const handleKey = (e) => {
        if (gameOver) return;

        setDirection(prev => {
        switch (e.key) {
            case "ArrowUp":
            if (prev.y === 1) return prev; // evita ir hacia abajo
            return { x: 0, y: -1 };

            case "ArrowDown":
            if (prev.y === -1) return prev; // evita ir hacia arriba
            return { x: 0, y: 1 };

            case "ArrowLeft":
            if (prev.x === 1) return prev; // evita ir derecha
            return { x: -1, y: 0 };

            case "ArrowRight":
            if (prev.x === -1) return prev; // evita ir izquierda
            return { x: 1, y: 0 };

            default:
            return prev;
        }
        });
    };

    window.addEventListener("keydown", handleKey);
    return () => window.removeEventListener("keydown", handleKey);
    }, [gameOver]);

    return (
      <div>
        <h1>Snake React</h1>
        <Score score={score} />
        {gameOver && <h2>Game Over</h2>}
        <Board snake={snake} food={food} direction={direction} />
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
 
</body>
</html>
