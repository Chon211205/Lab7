<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Snake React</title>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>

    body {
    margin: 0;
    padding: 0;

    font-family: "Comic Sans MS", cursive;
    background-color: #fffdf3;

    background-image:
        linear-gradient(#e6dcc3 1px, transparent 1px);

    background-size: 100% 28px;
    }

    body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 60px;
    width: 2px;
    height: 100%;
    background: #ff6b6b;
    opacity: 0.6;
    }

    h1 {
    color: #2d2d2d;
    text-shadow: 2px 2px 0px #dcdcdc;
    }

    button {
    font-family: "Comic Sans MS", cursive;
    }

    h1, h2 {
    text-align: center;
    }

    .board {
    position: relative;
    width: 400px;
    height: 400px;
    margin: 30px auto;

    background-color: #fefae0;

    background-image:
        linear-gradient(#e0dcc0 1px, transparent 1px),
        linear-gradient(90deg, #e0dcc0 1px, transparent 1px);

    background-size: 20px 20px;

    border: 4px solid #333;
    border-radius: 12px;
    box-shadow: 4px 4px 0px #999;
    }

    .snake-part {
    position: absolute;
    width: 20px;
    height: 20px;

    background-color: #7ed957;
    border: 2px solid #2d6a4f; 
    border-radius: 6px;
    transition: left 0.11s linear, top 0.11s linear;
    }

    .head {
    background-color: #95e06c;
    border: 2px solid #1b4332;
    }

    .tail {
    background-color: #5fbf3a;
    }

    .eye {
    position: absolute;
    width: 6px;
    height: 6px;
    background: white;
    border: 1px solid black;
    border-radius: 50%;
    }

    .eye::after {
    content: "";
    position: absolute;
    width: 3px;
    height: 3px;
    background: black;
    border-radius: 50%;
    top: 1px;
    left: 1px;
    }

    .eye1 { top: 4px; left: 4px; }
    .eye2 { top: 4px; right: 4px; }

    .right.eye1 { top: 6px; left: 10px; }
    .right.eye2 { top: 10px; left: 10px; }

    .left.eye1 { top: 6px; left: 2px; }
    .left.eye2 { top: 10px; left: 2px; }

    .up.eye1 { top: 2px; left: 6px; }
    .up.eye2 { top: 2px; right: 6px; }

    .down.eye1 { bottom: 2px; left: 6px; }
    .down.eye2 { bottom: 2px; right: 6px; }

    .mouth {
    position: absolute;
    width: 6px;
    height: 4px;
    background: #1b4332;
    border-radius: 2px;
    }

    .mouth-right {
    top: 8px;
    right: 1px;
    }

    .mouth-left {
    top: 8px;
    left: 1px;
    }

    .mouth-up {
    top: 1px;
    left: 7px;
    transform: rotate(90deg);
    }

    .mouth-down {
    bottom: 1px;
    left: 7px;
    transform: rotate(90deg);
    }

    .mouth-open {
    width: 9px;
    height: 7px;
    border-radius: 50%;
    }

    .food {
    position: absolute;
    width: 20px;
    height: 20px;

    background-color: #ff595e;
    border: 2px solid #9e2a2b;
    border-radius: 50%;
    }

    .stem {
    position: absolute;
    width: 3px;
    height: 6px;
    background: #5a3e1b;
    top: -4px;
    left: 8px;
    border-radius: 2px;
    }

    .leaf {
    position: absolute;
    width: 6px;
    height: 4px;
    background: #4caf50;
    top: -3px;
    left: 10px;
    border-radius: 50%;
    transform: rotate(30deg);
    }

    .snake-part,
    .food {
    will-change: left, top;
    }

    .start-screen,
    .restart-screen {
    width: 430px;
    margin: 40px auto;
    padding: 35px 25px;
    background-color: #fff7d6;
    background-image:
        linear-gradient(#f0e6b8 1px, transparent 1px),
        linear-gradient(90deg, #f0e6b8 1px, transparent 1px);
    background-size: 22px 22px;

    border: 4px solid #2d2d2d;
    border-radius: 18px;
    box-shadow: 6px 6px 0px #8d8d8d;
    text-align: center;
    }

    .start-title,
    .gameover-title {
    font-size: 48px;
    color: #2d6a4f;
    margin-bottom: 10px;
    letter-spacing: 3px;
    text-shadow: 2px 2px 0px #b7e4c7;
    }

    .gameover-title {
    color: #c1121f;
    text-shadow: 2px 2px 0px #ffb3b3;
    }

    .start-subtitle,
    .score-text,
    .instructions {
    color: #333;
    font-size: 16px;
    }

    .start-button,
    .restart-button {
    background-color: #7ed957;
    color: #1b1b1b;
    border: 3px solid #2d6a4f;
    padding: 14px 35px;
    font-size: 18px;
    font-weight: bold;
    border-radius: 14px;
    cursor: pointer;
    box-shadow: 4px 4px 0px #2d6a4f;
    transition: transform 0.15s, box-shadow 0.15s;
    }

    .restart-button {
    background-color: #ff595e;
    border-color: #9e2a2b;
    box-shadow: 4px 4px 0px #9e2a2b;
    color: white;
    }

    .start-button:hover,
    .restart-button:hover {
    transform: translate(2px, 2px);
    box-shadow: 2px 2px 0px #333;
    }

    .instructions {
    margin-top: 25px;
    line-height: 1.5;
    }

  </style>
</head>

<body>
  <div id="root"></div>

<script type="text/babel">
  const { useState, useEffect } = React;

  const cellSize = 20;
  const boardSize = 20;

    function Snake({ snake, direction, isEating }) {
    return (
        <>
        {snake.map((part, index) => {
            let className = "snake-part";

            if (index === 0) className += " head";
            else if (index === snake.length - 1) className += " tail";

            return (
            <div
                key={index}
                className={className}
                style={{
                left: part.x * 20,
                top: part.y * 20
                }}
            >
                {index === 0 && (
                <>
                    <div className={`eye eye1 ${getEyeClass(direction)}`}></div>
                    <div className={`eye eye2 ${getEyeClass(direction)}`}></div>
                    <div className={`mouth ${getMouthClass(direction)} ${isEating ? "mouth-open" : ""}`}></div>
                    <div className={`eye eye1 ${getEyeClass(direction)}`}></div>
                    <div className={`eye eye2 ${getEyeClass(direction)}`}></div>
                </>
                )}
            </div>
            );
        })}
        </>
    );
    }

    function getEyeClass(direction) {
    if (direction.x === 1) return "right";
    if (direction.x === -1) return "left";
    if (direction.y === -1) return "up";
    if (direction.y === 1) return "down";
    }

    function getMouthClass(direction) {
    if (direction.x === 1) return "mouth-right";
    if (direction.x === -1) return "mouth-left";
    if (direction.y === -1) return "mouth-up";
    if (direction.y === 1) return "mouth-down";
    }

    function Food({ food }) {
    return (
        <div
        className="food"
        style={{
            left: food.x * 20,
            top: food.y * 20
        }}
        >
        <div className="stem"></div>
        <div className="leaf"></div>
        </div>
    );
    }

  function Score({ score }) {
    return <h2>Puntaje: {score}</h2>;
  }

    function Level({ score }) {
    const level = Math.floor(score / 3) + 1;
    return <h2>Nivel: {level}</h2>;
    }

  function Board({ snake, food, direction, isEating }) {
    return (
      <div className="board">
        <Snake snake={snake} direction={direction} isEating={isEating} />
        <Food food={food} />
      </div>
    );
  }

    function resetGame() {
    setSnake([
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
    ]);
    setDirection({ x: 1, y: 0 });
    setFood({
        x: Math.floor(Math.random() * boardSize),
        y: Math.floor(Math.random() * boardSize)
    });
    setScore(0);
    setGameOver(false);
    setGameStarted(true); 
    }

  function App() {
    const [snake, setSnake] = useState([
      { x: 10, y: 10 },
      { x: 9, y: 10 },
      { x: 8, y: 10 }
    ]);

    const [direction, setDirection] = useState({ x: 1, y: 0 });
    const [food, setFood] = useState({ x: 5, y: 5 });
    const [isEating, setIsEating] = useState(false);
    const [score, setScore] = useState(0);
    const [gameOver, setGameOver] = useState(false);
    const [speed, setSpeed] = useState(100);
    const [gameStarted, setGameStarted] = useState(false);

    function generateFood() {
      return {
        x: Math.floor(Math.random() * boardSize),
        y: Math.floor(Math.random() * boardSize)
      };
    }

    useEffect(() => {
      if (gameOver || !gameStarted) return;

      const interval = setInterval(() => {
        setSnake(prevSnake => {
        const newHead = {
            x: prevSnake[0].x + direction.x,
            y: prevSnake[0].y + direction.y
        };

        if (
            newHead.x < 0 ||
            newHead.y < 0 ||
            newHead.x >= boardSize ||
            newHead.y >= boardSize
        ) {
            setGameOver(true);
            return prevSnake;
        }

        const hitSelf = prevSnake.some(part => {
            return part.x === newHead.x && part.y === newHead.y;
        });

        if (hitSelf) {
            setGameOver(true);
            return prevSnake;
        }

        const ateFood = newHead.x === food.x && newHead.y === food.y;

        if (ateFood) {
            setFood(generateFood());
            setScore(prev => prev + 1);
            setIsEating(true);
            setTimeout(() => setIsEating(false), 180);
            setSpeed(prevSpeed => Math.max(70, prevSpeed - 10));
            return [newHead, ...prevSnake];
        }

        return [newHead, ...prevSnake.slice(0, -1)];
        });
      }, speed);

      return () => clearInterval(interval);
    }, [direction, gameOver, food, gameStarted, speed]);

    useEffect(() => {
    const handleKey = (e) => {
        if (gameOver) return;

        setDirection(prev => {
        switch (e.key) {
            case "ArrowUp":
            if (prev.y === 1) return prev; 
            return { x: 0, y: -1 };

            case "ArrowDown":
            if (prev.y === -1) return prev; 
            return { x: 0, y: 1 };

            case "ArrowLeft":
            if (prev.x === 1) return prev; 
            return { x: -1, y: 0 };

            case "ArrowRight":
            if (prev.x === -1) return prev; 
            return { x: 1, y: 0 };

            default:
            return prev;
        }
        });
    };

        window.addEventListener("keydown", handleKey);
        return () => window.removeEventListener("keydown", handleKey);
    }, [gameOver]);

    function resetGame() {
        setSnake([
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
        ]);
        setDirection({ x: 1, y: 0 });
        setFood(generateFood());
        setScore(0);
        setGameOver(false);
        setGameStarted(true);
        setSpeed(180);
    }

    return (
        <div>
        {!gameStarted && (
        <div className="start-screen">
            <h1 className="start-title">SNAKE</h1>
            <p className="start-subtitle">Come, crece y evita chocar.</p>

            <button className="start-button" onClick={() => setGameStarted(true)}>
            Iniciar juego
            </button>

            <div className="instructions">
            <p>Usa las flechas del teclado para moverte</p>
            <p>Evita los bordes y tu propia cola</p>
            </div>
        </div>
        )}

        {gameStarted && !gameOver && (
            <>
            <h1>Snake React</h1>
            <Score score={score} />
            <Board snake={snake} food={food} direction={direction} isEating={isEating} />
            <Level score={score} />
            </>
        )}

        {gameOver && (
        <div className="restart-screen">
            <h2 className="gameover-title">Game Over</h2>
            <p className="score-text">Puntaje: {score}</p>

            <button className="restart-button" onClick={resetGame}>
            Jugar de nuevo
            </button>
        </div>
        )}
        </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
 
</body>
</html>
